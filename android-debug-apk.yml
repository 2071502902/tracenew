name: Android Debug APK

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  build-android:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install

      - name: Prepare web assets
        run: |
          echo "Current files:"
          find . -maxdepth 2 -type f | sort

          mkdir -p www

          if [ -f "www/index.html" ]; then
            echo "www/index.html already exists."
          elif [ -f "index.html" ]; then
            echo "Copy root index.html to www/index.html"
            cp index.html www/index.html
          else
            echo "ERROR: Neither www/index.html nor root index.html exists."
            exit 1
          fi

          if [ ! -f "www/manifest.json" ]; then
            echo '{"name":"Trace Note","short_name":"TraceNote","start_url":"./index.html","display":"standalone","background_color":"#f8f4ef","theme_color":"#f8f4ef"}' > www/manifest.json
          fi

          echo "Prepared www folder:"
          ls -la www

      - name: Add Android platform if missing
        run: |
          if [ ! -d "android" ]; then
            npx cap add android
          fi

      - name: Sync Capacitor
        run: npx cap sync android

      - name: Make Gradle executable
        run: chmod +x android/gradlew

      - name: Build debug APK
        run: cd android && ./gradlew assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: trace-note-debug-apk
          path: android/app/build/outputs/apk/debug/app-debug.apk
